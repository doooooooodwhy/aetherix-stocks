<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherix (AETX) - Paper Trading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f172a 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stock-symbol {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }
        .current-price { font-size: 4.5rem; font-weight: 700; margin-top: 20px; }
        .price-change { font-size: 1.8rem; margin-top: 10px; font-weight: 600; }
        .positive { color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
        .negative { color: #ff4757; text-shadow: 0 0 10px rgba(255, 71, 87, 0.5); }
        .neutral { color: #888; }
        .base-info {
            margin-top: 20px;
            padding: 12px 25px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 30px;
            display: inline-block;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        .chart-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chart-wrapper { 
            position: relative; 
            height: 450px; 
            width: 100%; 
            background: rgba(0, 0, 0, 0.3); 
            border-radius: 15px; 
            overflow: hidden; 
        }
        #stockCanvas { width: 100%; height: 100%; }
        .legend { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            margin-top: 20px; 
            flex-wrap: wrap; 
        }
        .legend-item { display: flex; align-items: center; gap: 10px; }
        .legend-line { width: 30px; height: 4px; border-radius: 2px; }
        .legend-green { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .legend-red { background: #ff4757; box-shadow: 0 0 10px #ff4757; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stat-label { color: #888; font-size: 0.9rem; text-transform: uppercase; }
        .stat-value { font-size: 2.2rem; font-weight: 700; margin-top: 10px; }
        .events-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .event-list { max-height: 300px; overflow-y: auto; }
        .event-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .event-indicator { width: 12px; height: 12px; border-radius: 50%; margin-right: 15px; }
        .event-green { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .event-red { background: #ff4757; box-shadow: 0 0 10px #ff4757; }
        .loading {
            text-align: center;
            padding: 20px;
            color: #00d4ff;
        }
        .error {
            text-align: center;
            padding: 20px;
            color: #ff4757;
        }
        .last-update {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        .refresh-btn {
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="stock-symbol">AETX</div>
            <div style="color: #888; margin-top: 5px;">Aetherix Corporation</div>
            <div class="price-display">
                <div class="current-price" id="currentPrice">Loading...</div>
                <div class="price-change neutral" id="priceChange">--</div>
                <div class="base-info">Base Value: <span>50 Aetherix</span></div>
            </div>
            <div class="last-update" id="lastUpdate">Fetching data from GitHub...</div>
            <button class="refresh-btn" onclick="fetchData()">🔄 Refresh</button>
        </div>

        <div class="chart-container">
            <div class="chart-wrapper">
                <canvas id="stockCanvas"></canvas>
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-line legend-green"></div>
                    <span>Buy Events (Price Up)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line legend-red"></div>
                    <span>Cashout Events (Price Down)</span>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Starting Price</div>
                <div class="stat-value" style="color: #00d4ff;">$50.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Current Price</div>
                <div class="stat-value" id="statCurrent">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Change</div>
                <div class="stat-value" id="statChange" style="color: #888;">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Event Count</div>
                <div class="stat-value" id="eventCount">--</div>
            </div>
        </div>

        <div class="events-container">
            <div style="font-size: 1.5rem; margin-bottom: 20px;">📊 Event History</div>
            <div class="event-list" id="eventList">
                <div class="loading">Loading events...</div>
            </div>
        </div>
    </div>

    <script>
        // GitHub configuration - CHANGE THESE
        const GITHUB_USER = "YOUR_GITHUB_USERNAME";
        const GITHUB_REPO = "YOUR_REPO_NAME";
        const DATA_FILE = "aetherix_data.json";

        // Raw GitHub URL (acts as free API)
        const DATA_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${DATA_FILE}`;

        let stockData = null;

        // Fetch data from GitHub
        async function fetchData() {
            const priceEl = document.getElementById('currentPrice');
            const updateEl = document.getElementById('lastUpdate');

            try {
                updateEl.textContent = "Fetching from GitHub...";

                // Add timestamp to prevent caching
                const response = await fetch(DATA_URL + "?t=" + Date.now(), {
                    cache: 'no-cache'
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                stockData = await response.json();
                console.log("Data loaded:", stockData);

                updateDisplay();
                drawChart();

                updateEl.textContent = `Last updated: ${new Date().toLocaleString()}`;
                updateEl.style.color = "#00ff88";

            } catch (error) {
                console.error("Error fetching data:", error);
                priceEl.textContent = "Error";
                updateEl.textContent = `Failed to load: ${error.message}`;
                updateEl.style.color = "#ff4757";

                document.getElementById('eventList').innerHTML = `
                    <div class="error">
                        ❌ Failed to load data from GitHub<br>
                        Make sure:<br>
                        1. GITHUB_USER is set to your username<br>
                        2. GITHUB_REPO is set to your repo<br>
                        3. aetherix_data.json exists in the repo<br>
                        4. Repo is public<br>
                        <br>
                        Error: ${error.message}
                    </div>
                `;
            }
        }

        function updateDisplay() {
            if (!stockData) return;

            const current = stockData.current_price;
            const base = stockData.base_value;
            const change = current - base;
            const changePercent = (change / base) * 100;

            // Update price
            document.getElementById('currentPrice').textContent = '$' + current.toFixed(2);

            const changeEl = document.getElementById('priceChange');
            changeEl.textContent = (change >= 0 ? '+' : '') + changePercent.toFixed(2) + '%';
            changeEl.className = 'price-change ' + (change > 0 ? 'positive' : change < 0 ? 'negative' : 'neutral');

            // Update stats
            document.getElementById('statCurrent').textContent = '$' + current.toFixed(2);
            document.getElementById('statCurrent').style.color = change >= 0 ? '#00ff88' : '#ff4757';

            document.getElementById('statChange').textContent = (change >= 0 ? '+' : '') + '$' + Math.abs(change).toFixed(2);
            document.getElementById('statChange').style.color = change >= 0 ? '#00ff88' : '#ff4757';

            document.getElementById('eventCount').textContent = stockData.events ? stockData.events.length : 0;

            // Update events
            updateEvents();
        }

        function updateEvents() {
            const list = document.getElementById('eventList');

            if (!stockData.events || stockData.events.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #666; padding: 40px;">No events yet. Use Discord bot to trade!</div>';
                return;
            }

            list.innerHTML = '';

            [...stockData.events].reverse().forEach(event => {
                const date = new Date(event.date);
                const item = document.createElement('div');
                item.className = 'event-item';

                const isGreen = event.type === 'green';
                const arrow = isGreen ? '▲' : '▼';
                const action = isGreen ? 'BUY' : 'CASHOUT';

                item.innerHTML = `
                    <div class="event-indicator ${isGreen ? 'event-green' : 'event-red'}"></div>
                    <div style="flex: 1;">
                        <div style="font-weight: 600; color: ${isGreen ? '#00ff88' : '#ff4757'}">
                            ${arrow} ${action} ${event.amount > 0 ? '(' + event.amount + ')' : ''}
                        </div>
                        <div style="color: #888; font-size: 0.85rem;">
                            ${date.toLocaleDateString()} at ${date.toLocaleTimeString()}
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-weight: 700; color: ${isGreen ? '#00ff88' : '#ff4757'}">
                            ${isGreen ? '+' : '-'}${event.impact.toFixed(2)}%
                        </div>
                        <div style="color: #666; font-size: 0.8rem;">
                            $${event.old_price.toFixed(2)} → $${event.new_price.toFixed(2)}
                        </div>
                    </div>
                `;

                list.appendChild(item);
            });
        }

        function drawChart() {
            const canvas = document.getElementById('stockCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width = canvas.parentElement.clientWidth;
            const height = canvas.height = canvas.parentElement.clientHeight;

            ctx.clearRect(0, 0, width, height);

            if (!stockData || !stockData.events) return;

            const padding = { top: 40, right: 60, bottom: 40, left: 60 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            const BASE_VALUE = 50;
            const events = stockData.events;

            // Calculate price range
            const allPrices = [BASE_VALUE, stockData.current_price];
            events.forEach(e => {
                allPrices.push(e.old_price, e.new_price);
            });

            const minPrice = Math.min(...allPrices) * 0.95;
            const maxPrice = Math.max(...allPrices) * 1.05;
            const priceRange = maxPrice - minPrice;

            // Draw grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (chartHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();

                const price = maxPrice - (priceRange / 5) * i;
                ctx.fillStyle = '#666';
                ctx.font = '11px Segoe UI';
                ctx.textAlign = 'right';
                ctx.fillText('$' + price.toFixed(2), padding.left - 10, y + 3);
            }

            // Draw base line (dashed at $50)
            const baseY = padding.top + ((maxPrice - BASE_VALUE) / priceRange) * chartHeight;
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.moveTo(padding.left, baseY);
            ctx.lineTo(width - padding.right, baseY);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#888';
            ctx.font = '10px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText('BASE', width - padding.right + 5, baseY + 3);

            if (events.length === 0) {
                // Just draw flat line at base
                ctx.beginPath();
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 3;
                ctx.moveTo(padding.left, baseY);
                ctx.lineTo(width - padding.right, baseY);
                ctx.stroke();
                return;
            }

            // Build points
            const points = [{ x: padding.left, y: baseY, price: BASE_VALUE }];
            events.forEach((event, i) => {
                const x = padding.left + ((i + 1) / (events.length + 1)) * chartWidth;
                const y = padding.top + ((maxPrice - event.new_price) / priceRange) * chartHeight;
                points.push({ x, y, price: event.new_price, event });
            });

            // Draw segments
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            for (let i = 0; i < points.length - 1; i++) {
                const curr = points[i];
                const next = points[i + 1];
                const event = next.event;

                ctx.beginPath();
                ctx.moveTo(curr.x, curr.y);
                ctx.lineTo(next.x, next.y);

                if (event.type === 'green') {
                    ctx.strokeStyle = '#00ff88';
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 10;
                } else {
                    ctx.strokeStyle = '#ff4757';
                    ctx.shadowColor = '#ff4757';
                    ctx.shadowBlur = 10;
                }

                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Draw event points
            points.forEach((point, i) => {
                if (i === 0) return;

                const event = point.event;
                ctx.beginPath();
                ctx.arc(point.x, point.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = event.type === 'green' ? '#00ff88' : '#ff4757';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // Current price indicator
            const last = points[points.length - 1];
            ctx.beginPath();
            ctx.arc(last.x, last.y, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = stockData.current_price >= BASE_VALUE ? '#00ff88' : '#ff4757';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // Auto-refresh every 10 seconds
        setInterval(fetchData, 10000);

        // Initial load
        fetchData();
    </script>
</body>
</html>
